<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" type="text/css" href="reset.css">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div class="main">
        <div class="score-card">
            <div class="player-one-score">
                <p>Player 1</p>
                <p>score</p>
                <p>4</p>
            </div>
            <div class="draw-score">
                <p>draws</p>
                <p>0</p>
            </div>
            <div class="player-two-score">
                <p>Player 2</p>
                <p>score</p>
                <p>3</p>
            </div>
        </div>
        <div class="current-turn">
            <p>Player 1's turn</p>
        </div>
        <div class="board">
            <div class="field" data-index="0"><p>X</p></div>
            <div class="field" data-index="1"><p>O</p></div>
            <div class="field" data-index="2"><p>X</p></div>
            <div class="field" data-index="3"><p>X</p></div>
            <div class="field" data-index="4"><p>X</p></div>
            <div class="field" data-index="5"><p>O</p></div>
            <div class="field" data-index="6"><p>O</p></div>
            <div class="field" data-index="7"><p>X</p></div>
            <div class="field" data-index="8"><p>O</p></div>
        </div>
        <div class="reset-button">
            <button>Reset</button>
        </div>
    </div>
</body>
</html>
